<div id="container"><div>

<script src="26b39.js"></script>
<script src="26b41.js"></script>

<script>
// Instantiate containers, output textarea, and buttons
const cnt = getContainer("container");
const txa = createTextarea("text-output");
const btnDiv = createDiv("button-container");
const oBtn = createButton("o-button", "Smiling");
const rBtn = createButton("r-button", "Winking");
const sBtn = createButton("s-button", "Sad");
const tBtn = createButton("t-button", "Angry");
const uBtn = createButton("u-button", "Frown");
const xBtn = createButton("x-button", "Newline");

// Append textarea to container
cnt.append(txa);
cnt.append(btnDiv);
btnDiv.append(oBtn);
btnDiv.append(rBtn);
btnDiv.append(sBtn);
btnDiv.append(tBtn);
btnDiv.append(uBtn);
btnDiv.append(xBtn);

// Change elements flex value
changeElementsFlex(
  ["text-output", "4"],
  ["button-container", "1"]  
);

// Bind consolex output to textarea and set EOL character
consolex.setOutput(txa);
consolex.setEOL("");

// Define list of emoticon 
const stickers = ["🙂", "😉", "😔", "😡", "🫥"];

// Set onclick event to each button
oBtn.addEventListener("click", () => {consolex.log(stickers[0]);});
rBtn.addEventListener("click", () => {consolex.log(stickers[1]);});
sBtn.addEventListener("click", () => {consolex.log(stickers[2]);});
tBtn.addEventListener("click", () => {consolex.log(stickers[3]);});
uBtn.addEventListener("click", () => {consolex.log(stickers[4]);});
xBtn.addEventListener("click", () => {consolex.log("\n");});
</script>
